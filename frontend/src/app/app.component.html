<main class="shell">
  <header class="topbar">
    <div>
      <p class="eyebrow">BioSafe Clinic</p>
      <h1>NextPulse Smart Monitoring</h1>
    </div>
    <div class="topbar-actions">
      <button type="button" class="refresh-btn" [class.spinning]="loading" (click)="loadDashboard()" [disabled]="loading" title="Aggiorna">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M8 16H3v5"/>
        </svg>
      </button>
    </div>
  </header>

  <section class="kpis">
    <article>
      <span>Letture</span>
      <strong>{{ kpis?.total_readings ?? 0 }}</strong>
    </article>
    <article>
      <span>Dispositivi</span>
      <strong>{{ kpis?.devices_count ?? 0 }}</strong>
    </article>
    <article class="warning">
      <span>Warning</span>
      <strong>{{ kpis?.warning_count ?? 0 }}</strong>
    </article>
    <article class="critical">
      <span>Critical</span>
      <strong>{{ kpis?.critical_count ?? 0 }}</strong>
    </article>
  </section>

  <router-outlet></router-outlet>
</main>
