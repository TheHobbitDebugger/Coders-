<header class="bg-slate-900 border-b border-slate-700 sticky top-0 z-50">
  <div class="max-w-[1920px] mx-auto px-4 py-3 flex items-center justify-between flex-wrap gap-3">
    <div class="flex items-center gap-3">
      <lucide-angular name="shield-check" class="w-7 h-7 text-green-400"></lucide-angular>
      <div>
        <h1 class="text-lg font-bold text-white leading-tight">BioSafe Clinic</h1>
        <p class="text-xs text-slate-400 leading-tight">Smart Monitoring Lab</p>
      </div>
    </div>

    <div class="flex items-center gap-4">
      <div class="hidden sm:flex items-center gap-2 text-slate-400">
        <lucide-angular name="clock" class="w-4 h-4"></lucide-angular>
        <span class="text-sm font-mono">{{ currentTime | date:'HH:mm:ss' }}</span>
        <span class="text-xs text-slate-500">{{ currentTime | date:'dd/MM/yyyy' }}</span>
      </div>

      <div class="flex items-center gap-2 px-3 py-1.5 rounded-full" [ngClass]="statusBgClass">
        <div class="w-2.5 h-2.5 rounded-full animate-pulse" [ngClass]="statusDotClass"></div>
        <span class="text-sm font-semibold" [ngClass]="statusTextClass">
          {{ systemStatus === 'OK' ? 'Sistema Operativo' : systemStatus }}
        </span>
      </div>
    </div>
  </div>
</header>
